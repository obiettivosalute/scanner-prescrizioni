<title>Scanner Prescrizioni · Obiettivo Salute</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blu-scuro:   #2e6da4;
    --blu-medio:   #4a90c4;
    --blu-chiaro:  #7bb8d4;
    --blu-pallido: #d6eaf8;
    --azzurro-bg:  #eaf4fb;
    --bianco:      #ffffff;
    --grigio-bg:   #f4f8fc;
    --grigio-card: #ffffff;
    --testo:       #1a3a52;
    --testo-sub:   #5a7f9a;
    --bordo:       #c5dff0;
    --verde-ok:    #27ae60;
    --rosso-err:   #e74c3c;
    --arancio:     #e67e22;
    --shadow:      0 2px 16px rgba(46,109,164,0.10);
    --shadow-hover:0 4px 24px rgba(46,109,164,0.18);
    --radius:      14px;
    --radius-sm:   8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--grigio-bg);
    color: var(--testo);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    background: var(--bianco);
    border-bottom: 2px solid var(--blu-pallido);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(46,109,164,0.08);
  }
  .header-logo img {
    height: 48px;
    display: block;
  }
  .header-info {
    text-align: right;
  }
  .header-info h1 {
    font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 700;
    color: var(--blu-scuro);
    letter-spacing: 0.2px;
  }
  .header-info small {
    display: block; font-size: 11px;
    color: var(--testo-sub); font-weight: 400;
  }
  .header-divider {
    width: 1px; height: 40px;
    background: var(--bordo);
    margin: 0 14px;
  }

  /* ── MAIN ── */
  main { flex: 1; padding: 18px 14px 32px; display: flex; flex-direction: column; gap: 14px; }

  /* ── CARD GENERICA ── */
  .card {
    background: var(--grigio-card);
    border: 1px solid var(--bordo);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-family: 'Nunito', sans-serif;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--blu-medio);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .card-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 14px;
    background: var(--blu-medio);
    border-radius: 2px;
  }

  /* ── CONFIG ── */
  .config-toggle {
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 700;
    color: var(--blu-scuro); padding: 0; width: 100%;
    justify-content: space-between;
  }
  .config-toggle .toggle-left { display: flex; align-items: center; gap: 8px; }
  .config-toggle .chevron {
    font-size: 16px; transition: transform 0.2s;
    color: var(--blu-medio);
  }
  .config-toggle.open .chevron { transform: rotate(180deg); }
  .config-body { display: none; margin-top: 14px; border-top: 1px solid var(--bordo); padding-top: 14px; }
  .config-body.open { display: block; }

  .field-group { margin-bottom: 12px; }
  .field-group:last-child { margin-bottom: 0; }
  .field-group label {
    display: block; font-size: 11px; font-weight: 700;
    color: var(--testo-sub); margin-bottom: 5px;
    text-transform: uppercase; letter-spacing: 0.8px;
  }
  .field-group input {
    width: 100%; background: var(--azzurro-bg);
    border: 1.5px solid var(--bordo); border-radius: var(--radius-sm);
    padding: 10px 12px; color: var(--testo);
    font-family: 'Lato', sans-serif; font-size: 13px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field-group input:focus {
    border-color: var(--blu-medio);
    box-shadow: 0 0 0 3px rgba(74,144,196,0.15);
  }

  /* ── SEZIONE FOTO ── */
  .photo-section { display: flex; flex-direction: column; gap: 10px; }

  .photo-slot {
    background: var(--azzurro-bg);
    border: 2px dashed var(--bordo);
    border-radius: var(--radius);
    min-height: 130px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0; position: relative; overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .photo-slot.has-photo {
    border-style: solid;
    border-color: var(--blu-medio);
    box-shadow: 0 0 0 3px rgba(74,144,196,0.12);
  }
  .photo-slot img.preview {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; opacity: 0.65;
    border-radius: calc(var(--radius) - 2px);
  }
  .slot-empty {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 16px;
  }
  .slot-empty .slot-icon { font-size: 32px; opacity: 0.5; }
  .slot-empty .slot-label {
    font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 700; color: var(--blu-scuro);
  }
  .slot-empty .slot-sub {
    font-size: 11px; color: var(--testo-sub);
  }

  /* Bottoni scelta foto */
  .slot-actions {
    display: flex; gap: 8px; padding: 10px 12px;
    position: relative; z-index: 2; width: 100%;
    justify-content: center;
  }
  .slot-btn {
    flex: 1; max-width: 140px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--blu-medio);
    background: var(--bianco);
    color: var(--blu-scuro);
    font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 5px;
    transition: background 0.15s, transform 0.1s;
    box-shadow: var(--shadow);
  }
  .slot-btn:active { transform: scale(0.97); background: var(--blu-pallido); }
  .slot-btn.camera { background: var(--blu-scuro); color: #fff; border-color: var(--blu-scuro); }
  .slot-btn.gallery { background: var(--bianco); color: var(--blu-scuro); }

  /* overlay quando ha foto */
  .slot-overlay {
    position: absolute; inset: 0; z-index: 2;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 8px;
  }
  .has-photo .slot-overlay { display: flex; }
  .has-photo .slot-empty { display: none; }
  .has-photo .slot-actions-empty { display: none; }

  .slot-overlay-top {
    width: 100%; display: flex; justify-content: space-between; align-items: center;
  }
  .slot-badge {
    background: rgba(46,109,164,0.85);
    color: #fff; border-radius: 20px;
    padding: 3px 10px; font-size: 10px; font-weight: 700;
    font-family: 'Nunito', sans-serif;
  }
  .slot-remove {
    background: var(--rosso-err); border: none; border-radius: 50%;
    width: 26px; height: 26px; color: #fff; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .slot-overlay-actions {
    display: flex; gap: 8px;
  }
  .slot-overlay-btn {
    background: rgba(255,255,255,0.92);
    border: 1.5px solid var(--blu-medio);
    color: var(--blu-scuro);
    border-radius: var(--radius-sm);
    padding: 6px 12px; font-size: 11px; font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    display: flex; align-items: center; gap: 4px;
  }

  input[type=file] { display: none; }

  /* ── STEP INDICATOR ── */
  .step-bar {
    display: none;
    align-items: center; gap: 6px;
    background: var(--azzurro-bg);
    border: 1px solid var(--bordo);
    border-radius: var(--radius);
    padding: 10px 14px;
  }
  .step-bar.show { display: flex; }
  .step-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600;
    font-family: 'Nunito', sans-serif;
    color: var(--testo-sub);
  }
  .step-dot {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--bordo); color: var(--testo-sub);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    transition: all 0.3s;
  }
  .step-dot.active { background: var(--blu-medio); color: #fff; }
  .step-dot.done { background: var(--verde-ok); color: #fff; }
  .step-sep { flex: 1; height: 1px; background: var(--bordo); min-width: 8px; }

  /* ── BOTTONI ── */
  .btn-primary {
    background: linear-gradient(135deg, var(--blu-medio), var(--blu-scuro));
    color: #fff; border: none; border-radius: var(--radius);
    padding: 16px; width: 100%; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: 'Nunito', sans-serif;
    letter-spacing: 0.3px;
    transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 4px 16px rgba(46,109,164,0.30);
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.93; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

  .btn-secondary {
    background: var(--bianco); color: var(--blu-scuro);
    border: 1.5px solid var(--blu-medio); border-radius: var(--radius);
    padding: 12px; width: 100%; font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: 'Nunito', sans-serif;
    transition: background 0.15s;
  }
  .btn-secondary:active { background: var(--blu-pallido); }

  /* ── STATUS ── */
  .status {
    border-radius: var(--radius); padding: 13px 16px;
    font-size: 13px; font-family: 'Nunito', sans-serif; font-weight: 600;
    display: none; align-items: center; gap: 8px;
  }
  .status.show { display: flex; }
  .status.loading {
    background: var(--azzurro-bg); border: 1.5px solid var(--blu-chiaro);
    color: var(--blu-scuro); animation: pulse 1.5s infinite;
  }
  .status.success {
    background: #eafaf1; border: 1.5px solid var(--verde-ok);
    color: #1e8449;
  }
  .status.error {
    background: #fdf2f0; border: 1.5px solid var(--rosso-err);
    color: #c0392b;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.65} }

  /* ── RISULTATI ── */
  .result-card { display: none; }
  .result-card.show { display: block; }
  .result-card .card-title { color: var(--verde-ok); }
  .result-card .card-title::before { background: var(--verde-ok); }

  .result-badge {
    display: inline-block; padding: 2px 10px;
    background: var(--azzurro-bg);
    border: 1px solid var(--blu-chiaro); border-radius: 20px;
    font-size: 10px; font-weight: 700; font-family: 'Nunito', sans-serif;
    color: var(--blu-scuro); margin-left: 6px;
  }

  .result-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .result-field {
    background: var(--azzurro-bg);
    border: 1px solid var(--bordo);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
  }
  .result-field.full { grid-column: 1 / -1; }
  .result-field .key {
    font-size: 9px; font-weight: 700; font-family: 'Nunito', sans-serif;
    color: var(--testo-sub); text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 2px;
  }
  .result-field .value {
    font-size: 12px; color: var(--testo); word-break: break-word; font-weight: 600;
  }
  .result-field .value.empty { color: var(--bordo); font-style: italic; font-weight: 400; }

  /* ── SPINNER ── */
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 12px;
    font-size: 10px; color: var(--testo-sub);
    font-family: 'Nunito', sans-serif;
    border-top: 1px solid var(--bordo);
    background: var(--bianco);
  }
</style>
</head>

<header>
  <div class="header-logo">
    <img id="logoImg" alt="Obiettivo Salute · Ortopedia Sanitaria">
  </div>
  <div class="header-divider"></div>
  <div class="header-info">
    <h1>Scanner Prescrizioni</h1>
    <small>Erogazione Forniture Protesiche</small>
  </div>
</header>

<main>

  <!-- CONFIGURAZIONE -->
  <div class="card">
    <button class="config-toggle" id="configToggle" onclick="toggleConfig()">
      <span class="toggle-left">⚙️ &nbsp;Configurazione API</span>
      <span class="chevron">▾</span>
    </button>
    <div class="config-body" id="configBody">
      <div class="field-group">
        <label>Anthropic API Key</label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." oninput="saveConfig()">
      </div>
      <div class="field-group">
        <label>Google Apps Script URL</label>
        <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec" oninput="saveConfig()">
      </div>
    </div>
  </div>

  <!-- FOTO -->
  <div class="card">
    <div class="card-title">Fotografie del Modulo</div>
    <div class="photo-section" id="photoSection">
      <!-- I 3 slot vengono generati da JS -->
    </div>
  </div>

  <!-- STEP BAR -->
  <div class="step-bar" id="stepBar">
    <div class="step-item">
      <div class="step-dot" id="s1">1</div>
      <span>Foto</span>
    </div>
    <div class="step-sep"></div>
    <div class="step-item">
      <div class="step-dot" id="s2">2</div>
      <span>Analisi OCR</span>
    </div>
    <div class="step-sep"></div>
    <div class="step-item">
      <div class="step-dot" id="s3">3</div>
      <span>Salvataggio</span>
    </div>
  </div>

  <!-- AZIONE -->
  <button class="btn-primary" id="btnAnalyze" onclick="analyzeAndSave()" disabled>
    🔍 Analizza e Salva in Google Sheets
  </button>

  <!-- STATUS -->
  <div class="status" id="status"></div>

  <!-- RISULTATI -->
  <div class="card result-card" id="resultCard">
    <div class="card-title">
      Campi Estratti
      <span class="result-badge" id="resultBadge"></span>
    </div>
    <div class="result-grid" id="resultFields"></div>
  </div>

  <!-- RESET -->
  <button class="btn-secondary" id="btnReset" style="display:none" onclick="resetAll()">
    ↺ &nbsp;Nuova Scansione
  </button>

</main>

<footer>
  Obiettivo Salute · Ortopedia Sanitaria &nbsp;·&nbsp; Scanner Prescrizioni ATS
</footer>

<input type="file" id="cam1" accept="image/*" capture="environment" onchange="handlePhoto(1)">
<input type="file" id="gal1" accept="image/*" onchange="handlePhoto(1,'gal')">
<input type="file" id="cam2" accept="image/*" capture="environment" onchange="handlePhoto(2)">
<input type="file" id="gal2" accept="image/*" onchange="handlePhoto(2,'gal')">
<input type="file" id="cam3" accept="image/*" capture="environment" onchange="handlePhoto(3)">
<input type="file" id="gal3" accept="image/*" onchange="handlePhoto(3,'gal')">

// ─── STATE ────────────────────────────────────────────────────────────────────
const state = { photos: { 1: null, 2: null, 3: null } };

const SLOT_LABELS = [
  { n: 1, label: "Foto 1 — Fronte modulo",       sub: "Pagina principale",  required: true  },
  { n: 2, label: "Foto 2 — Retro / pagina 2",    sub: "Se presente",        required: false },
  { n: 3, label: "Foto 3 — Dettaglio presidio",  sub: "Opzionale",          required: false },
];

// ─── BUILD SLOTS ──────────────────────────────────────────────────────────────
function buildSlots() {
  const section = document.getElementById('photoSection');
  section.innerHTML = '';
  SLOT_LABELS.forEach(({ n, label, sub }) => {
    section.innerHTML += `
    <div class="photo-slot" id="slot${n}">
      <img class="preview" id="preview${n}" style="display:none">

      <!-- Stato vuoto -->
      <div class="slot-empty" id="empty${n}">
        <div class="slot-icon">📷</div>
        <div class="slot-label">${label}</div>
        <div class="slot-sub">${sub}</div>
      </div>
      <div class="slot-actions slot-actions-empty" id="actions${n}">
        <button class="slot-btn camera" onclick="triggerInput('cam${n}')">📷 Fotocamera</button>
        <button class="slot-btn gallery" onclick="triggerInput('gal${n}')">🖼 Galleria</button>
      </div>

      <!-- Stato con foto -->
      <div class="slot-overlay" id="overlay${n}">
        <div class="slot-overlay-top">
          <span class="slot-badge">Foto ${n} ✓</span>
          <button class="slot-remove" onclick="removePhoto(event,${n})">✕</button>
        </div>
        <div class="slot-overlay-actions">
          <button class="slot-overlay-btn" onclick="triggerInput('cam${n}')">📷 Riprendi</button>
          <button class="slot-overlay-btn" onclick="triggerInput('gal${n}')">🖼 Cambia</button>
        </div>
      </div>
    </div>`;
  });
}

function triggerInput(id) { document.getElementById(id).click(); }

// ─── CONFIG ───────────────────────────────────────────────────────────────────
function loadConfig() {
  // Credenziali salvate nel browser (localStorage)
  const c = JSON.parse(localStorage.getItem('rxscan_config') || '{}');
  if (c.apiKey)    document.getElementById('apiKey').value    = c.apiKey;
  if (c.scriptUrl) document.getElementById('scriptUrl').value = c.scriptUrl;
  // Apri config automaticamente se mancano le credenziali
  if (!c.apiKey || !c.scriptUrl) {
    document.getElementById('configBody').classList.add('open');
    document.getElementById('configToggle').classList.add('open');
  }
}
function saveConfig() {
  localStorage.setItem('rxscan_config', JSON.stringify({
    apiKey:    document.getElementById('apiKey').value,
    scriptUrl: document.getElementById('scriptUrl').value,
  }));
  checkReady();
}
function toggleConfig() {
  const body    = document.getElementById('configBody');
  const toggle  = document.getElementById('configToggle');
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}

// ─── PHOTO HANDLING ───────────────────────────────────────────────────────────
function handlePhoto(n, source) {
  const inputId = source === 'gal' ? 'gal' + n : 'cam' + n;
  const file = document.getElementById(inputId).files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    state.photos[n] = dataUrl.split(',')[1];
    const preview = document.getElementById('preview' + n);
    preview.src = dataUrl;
    preview.style.display = 'block';
    document.getElementById('slot' + n).classList.add('has-photo');
    checkReady();
  };
  reader.readAsDataURL(file);
}

function removePhoto(e, n) {
  e.stopPropagation();
  state.photos[n] = null;
  const preview = document.getElementById('preview' + n);
  preview.style.display = 'none'; preview.src = '';
  document.getElementById('slot' + n).classList.remove('has-photo');
  document.getElementById('cam' + n).value = '';
  document.getElementById('gal' + n).value = '';
  checkReady();
}

function checkReady() {
  const hasPhoto = state.photos[1] || state.photos[2] || state.photos[3];
  const hasKey   = document.getElementById('apiKey').value.trim();
  document.getElementById('btnAnalyze').disabled = !(hasPhoto && hasKey);
}

Il campo "voci" è un array. Ogni RIGA della tabella presidi nel documento
deve diventare UN ELEMENTO SEPARATO dell'array.

ESEMPIO CORRETTO — documento con 3 righe presidio:
"voci": [
  { "tipo": "DIAGNOSI", "cod_diagnosi": "V49.70", "descrizione_diagnosi": "AMPUTAZIONE ARTO INFERIORE" },
  { "tipo": "PRESIDIO", "presidio_prescritto": "RIPARAZIONI ANELLO IN SILICONE", "codice_presidio": "062492784", "quantita": "1", "prezzo_unitario": "0,00", "iva_percentuale": "22,00", "importo": "0,00", "importo_iva": "0,00" },
  { "tipo": "PRESIDIO", "presidio_prescritto": "RIPARAZIONI RIVESTIMENTO TOTALE", "codice_presidio": "062492787", "quantita": "1", "prezzo_unitario": "0,00", "iva_percentuale": "22,00", "importo": "0,00", "importo_iva": "0,00" },
  { "tipo": "PRESIDIO", "presidio_prescritto": "RIPARAZIONI RIDUZIONE VOLUMETRICA", "codice_presidio": "062492790", "quantita": "1", "prezzo_unitario": "0,00", "iva_percentuale": "22,00", "importo": "0,00", "importo_iva": "0,00" }
]

ESEMPIO SBAGLIATO — NON fare mai così:
"voci": [
  { "tipo": "PRESIDIO", "presidio_prescritto": "TUTTE LE RIPARAZIONI...", "codice_presidio": "062492784, 062492787, 062492790", "quantita": "3" }
]

REGOLE:
1. Ogni riga della tabella = 1 oggetto separato nell'array. MAI unire righe diverse.
2. Copia il testo della descrizione presidio esattamente come appare nel documento.
3. Ogni codice presidio va in un oggetto separato — MAI concatenare codici con "," o ";".
4. Cattura quantita, prezzo_unitario, iva_percentuale, importo, importo_iva da ogni riga.
5. I presidi continuano nelle pagine successive — scorri TUTTE le pagine e raccoglili TUTTI.
6. Se hai 11 righe presidio nel documento, l'array voci deve avere 11 oggetti PRESIDIO.

Se un campo non è leggibile, usa stringa vuota "".
Restituisci SOLO il JSON.`;

// ─── MAIN FLOW ────────────────────────────────────────────────────────────────
async function analyzeAndSave() {
  const apiKey    = document.getElementById('apiKey').value.trim();
  const scriptUrl = document.getElementById('scriptUrl').value.trim();
  if (!apiKey) { showStatus('⚠️ Inserisci la API Key Anthropic nella configurazione.', 'error'); return; }

  setLoading(true);
  document.getElementById('stepBar').classList.add('show');
  setStep(1);

  const content = [];
  for (const n of [1, 2, 3]) {
    if (state.photos[n]) {
      content.push({ type: "image", source: { type: "base64", media_type: "image/jpeg", data: state.photos[n] } });
    }
  }
  content.push({ type: "text", text: "Estrai tutti i campi del modulo di prescrizione protesica visibile nelle immagini." });

  showStatus('⏳ Analisi OCR in corso...', 'loading');
  setStep(2);

  let extracted = {};
  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1500, system: SYSTEM_PROMPT, messages: [{ role: "user", content }] })
    });
    if (!resp.ok) { const err = await resp.json(); throw new Error(err.error?.message || `HTTP ${resp.status}`); }
    const data = await resp.json();
    const raw   = data.content.find(b => b.type === 'text')?.text || '{}';
    extracted   = JSON.parse(raw.replace(/```json|```/g, '').trim());
    showStatus('✅ Campi estratti correttamente.', 'success');
  } catch (err) {
    showStatus('❌ Errore analisi: ' + err.message, 'error');
    setLoading(false); return;
  }

  renderResults(extracted);

  if (scriptUrl) {
    setStep(3);
    showStatus('⏳ Salvataggio su Google Sheets...', 'loading');
    try {
      await saveToSheets(scriptUrl, extracted);
      showStatus('✅ Dati salvati su Google Sheets!', 'success');
    } catch (err) {
      showStatus('⚠️ Estrazione OK, errore salvataggio: ' + err.message, 'error');
    }
  } else {
    setStep(3);
    showStatus('✅ Estrazione completata. (Google Sheets non configurato)', 'success');
  }

  setLoading(false);
  document.getElementById('btnReset').style.display = 'block';
}

async function saveToSheets(url, data) {
  const campiPrescrizione = [
    "numero_pratica","tipo_fornitura","data_presentazione","art17_comma5",
    "cognome","nome","data_nascita","sesso","codice_fiscale","comune",
    "codice_regionale_assistito","residenza","telefono",
    "avente_diritto","cod_diagnosi","percorso_erogativo",
    "medico_cognome_nome","codice_medico","struttura_sanitaria",
    "codice_struttura","data_prescrizione","note"
  ];
  const prescrizione = {};
  campiPrescrizione.forEach(k => { prescrizione[k] = data[k] || ""; });

  // Usa l'array voci dal nuovo formato, con fallback al vecchio formato flat
  let voci = [];
  if (Array.isArray(data.voci) && data.voci.length > 0) {
    voci = data.voci;
  } else {
    // Fallback: vecchio formato con campi singoli
    if (data.diagnosi || data.cod_diagnosi) {
      voci.push({ tipo: "DIAGNOSI", cod_diagnosi: data.cod_diagnosi || "", descrizione_diagnosi: data.diagnosi || "" });
    }
    if (data.presidio_prescritto) {
      voci.push({
        tipo: "PRESIDIO",
        presidio_prescritto: data.presidio_prescritto || "", codice_presidio: data.codice_presidio || "",
        quantita: data.quantita || "", nome_commerciale: data.nome_commerciale || "",
        prezzo_unitario: data.prezzo_unitario || "", iva_percentuale: data.iva_percentuale || "",
        importo: data.importo || "", importo_iva: data.importo_iva || "",
        collaudo: data.collaudo || "", televisita: data.televisita || ""
      });
    }
  }

  await fetch(url, {
    method: "POST", mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ timestamp: new Date().toISOString(), prescrizione, voci })
  });
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
function showStatus(msg, type) {
  const el = document.getElementById('status');
  const icons = { loading: '⏳', success: '✅', error: '❌' };
  el.innerHTML = `<span>${msg}</span>`;
  el.className = `status show ${type}`;
}

function setLoading(on) {
  const btn = document.getElementById('btnAnalyze');
  btn.disabled = on;
  btn.innerHTML = on ? '<span class="spinner"></span> Elaborazione...' : '🔍 Analizza e Salva in Google Sheets';
}

function setStep(n) {
  for (let i = 1; i <= 3; i++) {
    const d = document.getElementById('s' + i);
    d.className = 'step-dot' + (i < n ? ' done' : i === n ? ' active' : '');
    d.textContent = i < n ? '✓' : i;
  }
}

const FULL_WIDTH_FIELDS = new Set(['residenza','diagnosi','presidio_prescritto','avente_diritto','struttura_sanitaria','note','percorso_erogativo']);

function renderResults(data) {
  const container = document.getElementById('resultFields');
  container.innerHTML = '';
  let filled = 0;
  for (const [key, val] of Object.entries(data)) {
    if (key === 'voci' && Array.isArray(val)) {
      if (val.length > 0) filled++;
      const div = document.createElement('div');
      div.className = 'result-field full';
      let vociHtml = val.map((v, i) => {
        const desc = v.tipo === 'DIAGNOSI'
          ? `${v.cod_diagnosi || ''} — ${v.descrizione_diagnosi || ''}`
          : `${v.presidio_prescritto || ''} (${v.codice_presidio || ''}) x${v.quantita || '1'}`;
        return `<div style="margin:2px 0;padding:4px 8px;background:#f0f0f0;border-radius:4px;">${i+1}. <b>${v.tipo}</b>: ${desc}</div>`;
      }).join('');
      div.innerHTML = `<div class="key">voci (${val.length})</div><div class="value">${vociHtml}</div>`;
      container.appendChild(div);
      continue;
    }
    if (val) filled++;
    const div = document.createElement('div');
    div.className = 'result-field' + (FULL_WIDTH_FIELDS.has(key) ? ' full' : '');
    div.innerHTML = `<div class="key">${key.replace(/_/g, ' ')}</div><div class="value ${!val?'empty':''}">${val||'—'}</div>`;
    container.appendChild(div);
  }
  document.getElementById('resultBadge').textContent = `${filled} campi`;
  document.getElementById('resultCard').classList.add('show');
}

function resetAll() {
  for (const n of [1, 2, 3]) {
    state.photos[n] = null;
    const preview = document.getElementById('preview' + n);
    if (preview) { preview.style.display = 'none'; preview.src = ''; }
    const slot = document.getElementById('slot' + n);
    if (slot) slot.classList.remove('has-photo');
    ['cam','gal'].forEach(p => { const el = document.getElementById(p+n); if(el) el.value=''; });
  }
  document.getElementById('status').className = 'status';
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('resultFields').innerHTML = '';
  document.getElementById('stepBar').classList.remove('show');
  document.getElementById('btnReset').style.display = 'none';
  document.getElementById('btnAnalyze').disabled = true;
  document.getElementById('btnAnalyze').innerHTML = '🔍 Analizza e Salva in Google Sheets';
  for (let i = 1; i <= 3; i++) {
    const d = document.getElementById('s' + i);
    if (d) { d.className = 'step-dot'; d.textContent = i; }
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildSlots();
loadConfig();
</script>

const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const manifestURL  = URL.createObjectURL(manifestBlob);
document.getElementById('pwaManifest').setAttribute('href', manifestURL);

// ── Service Worker (cache offline) ───────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'scanner-rx-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e => {
      // Passa le richieste API, cache per il resto
      if (e.request.url.includes('api.anthropic.com') || 
          e.request.url.includes('script.google.com')) {
        return;
      }
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request))
      );
    });
  `;
  const swBlob = new Blob([swCode], {type: 'application/javascript'});
  const swURL  = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL, {scope: './'}
  ).then(() => console.log('SW registrato')
  ).catch(e => console.log('SW non disponibile:', e));
}

// ── Banner installazione iOS ──────────────────────────────────────────────────
function isIos() {
  return /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
}
function isInStandaloneMode() {
  return ('standalone' in navigator) && navigator.standalone;
}

window.addEventListener('load', () => {
  if (isIos() && !isInStandaloneMode()) {
    const banner = document.getElementById('installBanner');
    if (banner) {
      // Mostra solo se non già dismissato
      if (!localStorage.getItem('installDismissed')) {
        banner.style.display = 'flex';
      }
    }
  }
});

// Android: intercetta evento beforeinstallprompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.getElementById('btnInstallAndroid');
  if (btn) btn.style.display = 'flex';
});

function installAndroid() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      const btn = document.getElementById('btnInstallAndroid');
      if (btn) btn.style.display = 'none';
    });
  }
}

function dismissInstall() {
  localStorage.setItem('installDismissed', '1');
  document.getElementById('installBanner').style.display = 'none';
}
</script>
